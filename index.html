<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>건강의 벗도 보이(VOY)나요?</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root {
    --teal: #3ca44d;
    --teal-dark: #2e8a3d;
    --teal-soft: #e6f4e8;
    --ink: #1f2b20;
    --paper: #f5f9f5;
    --muted: #6f7d70;
    --border: #e6efe6;
    --danger: #c0504a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont,
      'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .fade-in { animation: fadeIn .4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  header {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: #fff;
    padding: 22px 0;
    box-shadow: 0 2px 14px rgba(46,138,61,.25);
  }
  .header-inner {
    max-width: 760px; margin: 0 auto; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 14px;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    background: #fff;
    border: 2px solid rgba(255,255,255,.7);
    border-radius: 14px;
    width: 60px; height: 60px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; letter-spacing: 1px;
    overflow: hidden; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
  }
  .logo-mark img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
  h1.title { margin: 0; font-size: 21px; font-weight: 800; }
  .subtitle { margin: 3px 0 0; font-size: 13px; opacity: .85; }
  nav { display: flex; gap: 8px; }
  .nav-btn {
    background: rgba(255,255,255,.15); color: #fff;
    border: 1px solid rgba(255,255,255,.35); border-radius: 999px;
    padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit;
  }
  .nav-btn.active { background: #fff; color: var(--teal-dark); }

  main { max-width: 760px; margin: 0 auto; padding: 26px 20px 60px; }

  .banner {
    background: var(--teal-soft); border: 1px solid rgba(60,164,77,.2);
    border-radius: 12px; padding: 14px 18px; font-size: 14px;
    line-height: 1.6; color: var(--teal-dark);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .banner-icon {
    background: var(--teal); color: #fff; border-radius: 999px;
    min-width: 22px; height: 22px; display: inline-flex;
    align-items: center; justify-content: center; font-size: 13px;
    font-weight: 700; margin-top: 1px; flex-shrink: 0;
  }
  .banner-text { flex: 1; min-width: 0; }

  section.card {
    background: #fff; border-radius: 16px; padding: 22px; margin-top: 18px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid var(--border);
  }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }
  .section-title { margin: 0; font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .count-badge {
    background: var(--teal); color: #fff; border-radius: 999px;
    padding: 4px 12px; font-size: 13px; font-weight: 700;
  }
  .channel-link {
    background: #fff; border: 1.5px solid var(--teal); color: var(--teal-dark);
    border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 600;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
    transition: all .15s;
  }
  .channel-link:hover { background: var(--teal); color: #fff; }

  .muted { color: var(--muted); font-size: 13.5px; margin: 0 0 12px; }
  .empty-box {
    background: var(--paper); border-radius: 12px; padding: 24px 18px;
    text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6;
  }

  .video-list { display: flex; flex-direction: column; gap: 8px; }
  .video-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    border-radius: 10px; border: 1px solid var(--border); background: #fff;
    transition: all .15s;
  }
  .video-row.clickable { cursor: pointer; }
  .video-row.checked { border: 2px solid var(--teal); background: #eef7ef; }
  .video-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--teal); flex-shrink: 0; }
  .thumb {
    width: 100px; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 6px;
    flex-shrink: 0; background: #e6efe6; display: block;
  }
  .video-info { flex: 1; min-width: 0; }
  .video-title {
    font-weight: 700; font-size: 14px; line-height: 1.35;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    word-break: break-all;
  }
  .video-desc {
    font-size: 12.5px; color: var(--muted); margin-top: 2px; line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .video-meta { display: flex; gap: 12px; font-size: 12px; color: #8a9a98; margin-top: 4px; align-items: center; flex-wrap: wrap; }
  .video-meta a { color: var(--teal); text-decoration: none; font-weight: 600; }

  /* 모바일: 썸네일은 그대로 작게 유지, 정보가 옆에 컴팩트 */
  @media (max-width: 560px) {
    .thumb { width: 84px; }
    .video-title { font-size: 13.5px; }
  }

  .row-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: #fff; border: 1px solid var(--border); border-radius: 6px;
    width: 30px; height: 28px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: inherit;
  }
  .icon-btn:hover { background: var(--paper); color: var(--ink); }
  .icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .url-list { display: flex; flex-direction: column; gap: 12px; }
  .url-row { display: flex; align-items: flex-start; gap: 10px; }
  .url-num {
    background: var(--paper); border: 1px solid var(--border); border-radius: 8px;
    min-width: 30px; height: 42px; display: flex; align-items: center;
    justify-content: center; font-weight: 700; color: var(--muted);
    font-size: 14px; flex-shrink: 0;
  }
  input.txt {
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 1.5px solid #d8e3e0; font-size: 14px; font-family: inherit;
    transition: all .15s;
  }
  input.txt:focus {
    outline: none; border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(60,164,77,.15);
  }
  .preview-box {
    display: flex; align-items: center; gap: 10px; margin-top: 8px;
    padding: 8px; background: var(--paper); border-radius: 10px;
  }
  .preview-thumb { width: 100px; aspect-ratio: 16 / 9; object-fit: cover; border-radius: 8px; background: #e6efe6; }
  .preview-title { font-size: 13px; font-weight: 600; line-height: 1.4; }
  .remove-btn {
    background: #fff; border: 1.5px solid #e0c0c0; color: var(--danger);
    border-radius: 8px; width: 42px; height: 42px; font-size: 20px;
    line-height: 1; flex-shrink: 0; cursor: pointer;
  }
  .add-btn {
    margin-top: 14px; background: #fff; border: 1.5px dashed var(--teal);
    color: var(--teal-dark); border-radius: 10px; padding: 10px 18px;
    font-size: 14px; font-weight: 600; width: 100%; cursor: pointer;
    font-family: inherit;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
  .label { display: block; font-size: 13px; font-weight: 600; color: #5a6b69; margin-bottom: 6px; }
  .submit-btn {
    margin-top: 18px; width: 100%;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: #fff; border: none; border-radius: 12px; padding: 15px;
    font-size: 16px; font-weight: 800; box-shadow: 0 4px 14px rgba(60,164,77,.35);
    cursor: pointer; font-family: inherit;
  }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .secondary-btn {
    margin-top: 12px; width: 100%; background: #fff; color: var(--teal-dark);
    border: 1.5px solid var(--teal); border-radius: 12px; padding: 12px;
    font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .mail-note { font-size: 12.5px; color: #8a9a98; margin-top: 10px; line-height: 1.6; text-align: center; }
  .delete-btn {
    background: #fff; border: 1.5px solid #e0c0c0; color: var(--danger);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    flex-shrink: 0; cursor: pointer; font-family: inherit;
  }
  .edit-btn {
    background: #fff; border: 1.5px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600;
    flex-shrink: 0; cursor: pointer; font-family: inherit;
  }

  .login-wrap { display: flex; justify-content: center; padding-top: 30px; }
  .login-card {
    background: #fff; border-radius: 18px; padding: 36px 30px; max-width: 380px;
    width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,.08);
    border: 1px solid var(--border);
  }
  .lock-icon { font-size: 36px; }
  .login-title { font-size: 20px; font-weight: 800; margin: 10px 0 6px; }

  .admin-top-bar {
    display: flex; gap: 8px; justify-content: flex-end; margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .top-bar-btn {
    background: #fff; border: 1.5px solid var(--border); color: var(--ink);
    border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit;
  }
  .top-bar-btn:hover { border-color: var(--teal); color: var(--teal-dark); }

  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-card {
    background: #fff; border-radius: 18px; padding: 28px;
    max-width: 420px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,.2);
  }
  .modal-title { font-size: 18px; font-weight: 800; margin: 0 0 14px; }

  footer { text-align: center; padding: 24px 20px 40px; font-size: 12.5px; color: #8a9a98; }
  .hidden { display: none; }
</style>
</head>

/* ---------- 비밀번호 해시 ---------- */
async function sha256(text) {
  const buf = new TextEncoder().encode(text);
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}
function getStoredHash() {
  return localStorage.getItem(PW_KEY) || CONFIG.DEFAULT_PW_HASH;
}
function setStoredHash(hash) {
  localStorage.setItem(PW_KEY, hash);
}

/* ---------- 유틸 ---------- */
function extractVideoId(url) {
  if (!url) return null;
  const patterns = [
    /(?:youtube\.com\/watch\?v=)([\w-]{11})/,
    /(?:youtu\.be\/)([\w-]{11})/,
    /(?:youtube\.com\/embed\/)([\w-]{11})/,
    /(?:youtube\.com\/shorts\/)([\w-]{11})/,
  ];
  for (const p of patterns) { const m = url.match(p); if (m) return m[1]; }
  const bare = url.trim().match(/^[\w-]{11}$/);
  return bare ? bare[0] : null;
}
async function fetchYoutubeTitle(videoId) {
  try {
    const res = await fetch(
      "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" +
      videoId + "&format=json"
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch { return null; }
}
function thumbUrl(id) { return "https://img.youtube.com/vi/" + id + "/hqdefault.jpg"; }
function esc(s) {
  return (s == null ? "" : String(s))
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

/* ---------- 영상 목록 저장/불러오기 (Supabase) ---------- */
let videoCache = []; // 메모리 캐시 (렌더링용 즉시 접근)

async function loadVideos() {
  try {
    const { data, error } = await sb
      .from("videos")
      .select("*")
      .order("sort_order", { ascending: true })
      .order("id", { ascending: true });
    if (error) throw error;
    // DB 컬럼명 → 기존 코드가 쓰는 필드명으로 매핑
    videoCache = (data || []).map(r => ({
      id: String(r.id),
      videoId: r.video_id,
      title: r.title,
      description: r.description || "",
      duration: r.duration || "",
      sort_order: r.sort_order || 0,
    }));
    return videoCache;
  } catch (e) {
    console.error("영상 목록 불러오기 실패:", e);
    return videoCache; // 실패 시 기존 캐시 유지
  }
}
function getVideos() { return videoCache; } // 동기 접근용

/* ---------- 상태 ---------- */
let state = {
  page: "user",
  checked: {},
  customUrls: ["", "", "", "", ""],
  customMeta: {},
  adminAuthed: false,
  editingId: null, // 영상 수정 중인 ID
  fName: "", fOrg: "", fEmail: "", fRecvEmail: "",
};

/* ---------- 페이지 전환 ---------- */
function showPage(page) {
  state.page = page;
  document.getElementById("navUser").classList.toggle("active", page === "user");
  document.getElementById("navAdmin").classList.toggle("active", page === "admin");
  document.getElementById("userPage").classList.toggle("hidden", page !== "user");
  document.getElementById("adminPage").classList.toggle("hidden", page !== "admin");
  if (page === "user") renderUser();
  else renderAdmin();
  // 페이지 전환 시 항상 최신 데이터 동기화
  (async () => {
    await loadVideos();
    if (state.page === page) {
      if (page === "user") renderUser();
      else renderAdmin();
    }
  })();
}

/* ================================================================
   사용자 페이지
   ================================================================ */
function renderUser() {
  const videos = getVideos();
  const totalSelected =
    videos.filter(v => state.checked[v.id]).length +
    state.customUrls.filter((u, i) => u.trim() && state.customMeta[i]).length;

  let html = '<div class="fade-in">';

  html += '<div class="banner"><span class="banner-icon">✓</span>' +
    '<span class="banner-text">아래 목록에서 받고 싶은 영상을 <strong>체크</strong>하거나, 원하는 ' +
    '유튜브 영상의 <strong>URL을 직접 입력</strong>한 뒤 신청하세요.</span></div>';

  html += '<section class="card"><div class="section-head">' +
    '<h2 class="section-title">📺 신청 가능한 영상 목록</h2>' +
    (totalSelected > 0 ? '<span class="count-badge">' + totalSelected + '개 선택됨</span>' : '') +
    '</div>';

  if (videos.length === 0) {
    html += '<div class="empty-box">아직 등록된 영상이 없습니다. 아래에서 원하는 영상 URL을 직접 입력해 신청하실 수 있어요.</div>';
  } else {
    html += '<div class="video-list">';
    videos.forEach(v => {
      const ck = state.checked[v.id];
      html += '<label class="video-row clickable' + (ck ? ' checked' : '') + '">' +
        '<input type="checkbox" ' + (ck ? 'checked' : '') + ' onchange="toggleCheck(\'' + v.id + '\')" />' +
        '<img class="thumb" src="' + thumbUrl(v.videoId) + '" alt="" />' +
        '<div class="video-info">' +
          '<div class="video-title">' + esc(v.title) + '</div>' +
          (v.description ? '<div class="video-desc">' + esc(v.description) + '</div>' : '') +
          '<div class="video-meta">' + (v.duration ? '<span>⏱ ' + esc(v.duration) + '</span>' : '') + '</div>' +
        '</div></label>';
    });
    html += '</div>';
  }
  html += '</section>';

  html += '<section class="card"><div class="section-head">' +
    '<h2 class="section-title">🔗 원하는 영상 직접 입력</h2>' +
    '<a class="channel-link" href="' + CONFIG.CHANNEL_URL + '" target="_blank" rel="noopener">▶ 건강의 벗 채널 보기</a>' +
    '</div>' +
    '<p class="muted">유튜브 영상 주소를 붙여넣으면 썸네일과 제목이 자동으로 나타납니다.</p>';

  html += '<div class="url-list">';
  state.customUrls.forEach((url, idx) => {
    const meta = state.customMeta[idx];
    html += '<div class="url-row"><span class="url-num">' + (idx + 1) + '</span>' +
      '<div style="flex:1">' +
        '<input class="txt" type="text" value="' + esc(url) + '" ' +
          'placeholder="https://www.youtube.com/watch?v=..." ' +
          'oninput="onCustomInput(' + idx + ', this.value)" />' +
        (meta ? '<div class="preview-box">' +
          '<img class="preview-thumb" src="' + thumbUrl(meta.videoId) + '" alt="" />' +
          '<span class="preview-title">' + esc(meta.title || "제목 불러오는 중...") + '</span>' +
        '</div>' : '') +
      '</div>' +
      (state.customUrls.length > 1 ? '<button class="remove-btn" onclick="removeCustom(' + idx + ')" title="삭제">×</button>' : '') +
    '</div>';
  });
  html += '</div>';
  html += '<button class="add-btn" onclick="addCustom()">+ URL 입력칸 추가</button>';
  html += '</section>';

  html += '<section class="card"><div class="section-head">' +
    '<h2 class="section-title">✍️ 신청자 정보</h2></div>' +
    '<div class="form-grid">' +
      '<div><label class="label">이름</label><input class="txt" type="text" placeholder="유일한" value="' + esc(state.fName) + '" oninput="state.fName=this.value" /></div>' +
      '<div><label class="label">소속</label><input class="txt" type="text" placeholder="부서 / 지점" value="' + esc(state.fOrg) + '" oninput="state.fOrg=this.value" /></div>' +
      '<div><label class="label">회사 이메일 (직원인증)</label><input class="txt" type="email" placeholder="***@yuhan.co.kr" value="' + esc(state.fEmail) + '" oninput="state.fEmail=this.value" /></div>' +
      '<div><label class="label">받으실 이메일 (변경가능)</label><input class="txt" type="email" placeholder="ex) yuhan, naver, gmail 모든 e-mail" value="' + esc(state.fRecvEmail) + '" oninput="state.fRecvEmail=this.value" /></div>' +
    '</div>' +
    '<button class="submit-btn" onclick="submitRequest()">📩 영상받기 요청 (' + totalSelected + '건)</button>' +
    '<p class="mail-note">버튼을 누르면 신청 내용이 ' + CONFIG.ADMIN_EMAIL + ' 로 자동 발송됩니다.</p>' +
    '</section>';

  html += '</div>';
  document.getElementById("userPage").innerHTML = html;
}

function toggleCheck(id) {
  state.checked[id] = !state.checked[id];
  renderUser();
}
function onCustomInput(idx, value) {
  state.customUrls[idx] = value;
  const vid = extractVideoId(value);
  if (vid) {
    if (!state.customMeta[idx] || state.customMeta[idx].videoId !== vid) {
      state.customMeta[idx] = { videoId: vid, title: "" };
      fetchYoutubeTitle(vid).then(t => {
        if (t && state.customMeta[idx] && state.customMeta[idx].videoId === vid) {
          state.customMeta[idx] = { videoId: vid, title: t };
          if (state.page === "user") renderUser();
        }
      });
    }
  } else {
    delete state.customMeta[idx];
  }
  renderUser();
  setTimeout(() => {
    const inputs = document.querySelectorAll("#userPage .url-row input.txt");
    if (inputs[idx]) { inputs[idx].focus(); inputs[idx].setSelectionRange(value.length, value.length); }
  }, 0);
}
function addCustom() { state.customUrls.push(""); renderUser(); }
function removeCustom(idx) {
  state.customUrls.splice(idx, 1);
  const newMeta = {};
  Object.keys(state.customMeta).forEach(k => {
    const ki = Number(k);
    if (ki < idx) newMeta[ki] = state.customMeta[ki];
    else if (ki > idx) newMeta[ki - 1] = state.customMeta[ki];
  });
  state.customMeta = newMeta;
  renderUser();
}

async function submitRequest() {
  const name = state.fName.trim();
  const org = state.fOrg.trim();
  const email = state.fEmail.trim();
  let recvEmail = state.fRecvEmail.trim();
  if (!recvEmail) recvEmail = email; // 받으실 이메일이 비어있으면 회사 이메일 사용
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!name || !org || !email) { alert("이름, 소속, 회사 이메일을 모두 입력해 주세요."); return; }
  if (!emailRe.test(email)) { alert("올바른 회사 이메일 형식을 입력해 주세요."); return; }
  if (!emailRe.test(recvEmail)) { alert("받으실 이메일 형식이 올바르지 않습니다."); return; }

  const videos = getVideos();
  const selReg = videos.filter(v => state.checked[v.id]);
  const selCustom = state.customUrls
    .map((u, i) => ({ url: u, meta: state.customMeta[i] }))
    .filter(x => x.url.trim() && x.meta);

  if (selReg.length === 0 && selCustom.length === 0) {
    alert("최소 한 개 이상의 영상을 선택하거나 URL을 입력해 주세요."); return;
  }

  // 메일 본문 작성
  let body = "";
  body += "===== 건강의 벗도 보이(VOY)나요? 영상받기 요청 =====\n\n";
  body += "■ 이름: " + name + "\n";
  body += "■ 소속: " + org + "\n";
  body += "■ 회사 이메일 (직원인증): " + email + "\n";
  body += "■ 받으실 이메일: " + recvEmail + "\n\n";
  body += "-------------------------------\n";

  let no = 1;
  if (selReg.length) {
    body += "\n[ 목록에서 선택한 영상 ]\n\n";
    selReg.forEach(v => {
      body += no + ". " + v.title + "\n";
      if (v.duration) body += "   길이: " + v.duration + "\n";
      body += "   URL: https://www.youtube.com/watch?v=" + v.videoId + "\n";
      body += "   썸네일: " + thumbUrl(v.videoId) + "\n\n";
      no++;
    });
  }
  if (selCustom.length) {
    body += "\n[ 직접 입력한 영상 ]\n\n";
    selCustom.forEach(x => {
      body += no + ". " + (x.meta.title || "(제목 불러오기 실패)") + "\n";
      body += "   URL: https://www.youtube.com/watch?v=" + x.meta.videoId + "\n";
      body += "   썸네일: " + thumbUrl(x.meta.videoId) + "\n\n";
      no++;
    });
  }
  body += "-------------------------------\n\n총 " + (no - 1) + "개 영상 신청\n";

  const subject = "[VOY 영상받기 요청] " + org + " " + name + " (" + (no - 1) + "건)";

  // 신청 버튼 비활성화
  const submitBtn = document.querySelector("#userPage .submit-btn");
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "📤 발송 중..."; }

  // EmailJS로 자동 발송
  try {
    await emailjs.send(
      CONFIG.EMAILJS_SERVICE_ID,
      CONFIG.EMAILJS_TEMPLATE_ID,
      {
        subject: subject,
        message: body,
        from_name: org + " " + name,
        reply_to: recvEmail,
      }
    );
    // 성공: 화면 초기화 + 안내
    alert("✅ 신청이 정상적으로 발송되었습니다!\n\n관리자에게 메일이 전달되었으며, 영상은 입력하신 받으실 이메일(" + recvEmail + ")로 전달될 예정입니다.");
    // 입력값 초기화
    state.checked = {};
    state.customUrls = ["", "", "", "", ""];
    state.customMeta = {};
    state.fName = ""; state.fOrg = ""; state.fEmail = ""; state.fRecvEmail = "";
    renderUser();
  } catch (err) {
    console.error("메일 발송 실패:", err);
    alert("❌ 메일 발송에 실패했습니다.\n\n잠시 후 다시 시도해 주시거나, 관리자에게 직접 문의해 주세요.\n(오류: " + (err && err.text ? err.text : "알 수 없는 오류") + ")");
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = "📩 영상받기 요청"; }
  }
}

/* ================================================================
   관리자 페이지
   ================================================================ */
function renderAdmin() {
  if (!state.adminAuthed) {
    document.getElementById("adminPage").innerHTML =
      '<div class="fade-in login-wrap"><div class="login-card">' +
      '<div class="lock-icon">🔒</div>' +
      '<h2 class="login-title">관리자 로그인</h2>' +
      '<p class="muted">영상 목록을 관리하려면 비밀번호를 입력하세요.</p>' +
      '<input class="txt" id="pw" type="password" placeholder="비밀번호" ' +
        'style="margin-top:16px" onkeydown="if(event.key===\'Enter\')doLogin()" />' +
      '<button class="submit-btn" style="margin-top:12px" onclick="doLogin()">로그인</button>' +
      '</div></div>';
    setTimeout(() => { const el = document.getElementById("pw"); if (el) el.focus(); }, 50);
    return;
  }

  const videos = getVideos();
  let html = '<div class="fade-in">';

  // 상단 액션 바
  html += '<div class="admin-top-bar">' +
    '<button class="top-bar-btn" onclick="openChangePwModal()">🔑 비밀번호 변경</button>' +
    '<button class="top-bar-btn" onclick="logoutAdmin()">로그아웃</button>' +
    '</div>';

  html += '<div class="banner"><span class="banner-icon">⚙</span>' +
    '<span class="banner-text">등록한 영상은 사용자 신청 페이지에 <strong>체크박스 목록</strong>으로 표시됩니다. ' +
    '(이 목록은 현재 이 브라우저에 저장됩니다.)</span></div>';

  /* 영상 추가/수정 폼 */
  const editing = state.editingId ? videos.find(v => v.id === state.editingId) : null;
  html += '<section class="card"><div class="section-head">' +
    '<h2 class="section-title">' + (editing ? '✏️ 영상 수정' : '➕ 영상 등록') + '</h2>' +
    (editing ? '<button class="top-bar-btn" onclick="cancelEdit()">취소</button>' : '') +
    '</div>' +
    '<label class="label">유튜브 URL</label>' +
    '<input class="txt" id="a-url" type="text" placeholder="https://www.youtube.com/watch?v=..." ' +
      'value="' + (editing ? "https://www.youtube.com/watch?v=" + editing.videoId : "") + '" ' +
      'oninput="onAdminUrl(this.value)" />' +
    '<div id="a-preview">' +
      (editing ? '<div class="preview-box"><img class="preview-thumb" src="' + thumbUrl(editing.videoId) + '" alt="" /><span class="preview-title">현재 영상</span></div>' : '') +
    '</div>' +
    '<div class="form-grid" style="margin-top:14px">' +
      '<div style="grid-column:1/-1"><label class="label">영상 제목 (URL 입력 시 자동 채움)</label>' +
        '<input class="txt" id="a-title" type="text" placeholder="영상 제목" value="' + esc(editing ? editing.title : "") + '" /></div>' +
      '<div style="grid-column:1/-1"><label class="label">영상 내용 / 설명 (선택)</label>' +
        '<input class="txt" id="a-desc" type="text" placeholder="간단한 영상 소개" value="' + esc(editing ? editing.description : "") + '" /></div>' +
      '<div><label class="label">영상 길이 (직접 입력)</label>' +
        '<input class="txt" id="a-dur" type="text" placeholder="예: 12:34" value="' + esc(editing ? editing.duration : "") + '" /></div>' +
    '</div>' +
    '<button class="submit-btn" onclick="' + (editing ? 'saveEdit()' : 'addVideo()') + '">' +
      (editing ? '수정 저장' : '목록에 추가') + '</button>' +
    '</section>';

  /* 등록 영상 관리 */
  html += '<section class="card"><div class="section-head">' +
    '<h2 class="section-title">🗂 등록된 영상 (' + videos.length + '개)</h2></div>';
  if (videos.length === 0) {
    html += '<div class="empty-box">등록된 영상이 없습니다. 위에서 첫 영상을 추가해 보세요.</div>';
  } else {
    html += '<div class="video-list">';
    videos.forEach((v, idx) => {
      html += '<div class="video-row">' +
        '<div class="row-actions">' +
          '<button class="icon-btn" onclick="moveVideo(\'' + v.id + '\', -1)" ' + (idx === 0 ? 'disabled' : '') + ' title="위로">▲</button>' +
          '<button class="icon-btn" onclick="moveVideo(\'' + v.id + '\', 1)" ' + (idx === videos.length - 1 ? 'disabled' : '') + ' title="아래로">▼</button>' +
        '</div>' +
        '<img class="thumb" src="' + thumbUrl(v.videoId) + '" alt="" />' +
        '<div class="video-info">' +
          '<div class="video-title">' + esc(v.title) + '</div>' +
          (v.description ? '<div class="video-desc">' + esc(v.description) + '</div>' : '') +
          '<div class="video-meta">' +
            (v.duration ? '<span>⏱ ' + esc(v.duration) + '</span>' : '') +
            '<a href="https://www.youtube.com/watch?v=' + v.videoId + '" target="_blank" rel="noopener">영상 보기 ↗</a>' +
          '</div>' +
        '</div>' +
        '<div class="row-actions">' +
          '<button class="edit-btn" onclick="startEdit(\'' + v.id + '\')">수정</button>' +
          '<button class="delete-btn" onclick="deleteVideo(\'' + v.id + '\')">삭제</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  }
  html += '</section></div>';
  document.getElementById("adminPage").innerHTML = html;
}

async function doLogin() {
  const pw = document.getElementById("pw").value;
  const hash = await sha256(pw);
  if (hash === getStoredHash()) {
    state.adminAuthed = true;
    renderAdmin();
  } else {
    alert("비밀번호가 올바르지 않습니다.");
  }
}
function logoutAdmin() {
  state.adminAuthed = false;
  state.editingId = null;
  renderAdmin();
}
function onAdminUrl(value) {
  const vid = extractVideoId(value);
  const prev = document.getElementById("a-preview");
  if (vid) {
    prev.innerHTML = '<div class="preview-box"><img class="preview-thumb" src="' +
      thumbUrl(vid) + '" alt="" /><span class="preview-title">썸네일 미리보기</span></div>';
    const titleEl = document.getElementById("a-title");
    if (titleEl && !titleEl.value) {
      fetchYoutubeTitle(vid).then(t => { if (t && !titleEl.value) titleEl.value = t; });
    }
  } else { prev.innerHTML = ""; }
}
async function addVideo() {
  const url = document.getElementById("a-url").value;
  const vid = extractVideoId(url);
  if (!vid) { alert("올바른 유튜브 URL을 입력해 주세요."); return; }
  const title = document.getElementById("a-title").value.trim();
  if (!title) { alert("영상 제목을 입력해 주세요."); return; }
  const description = document.getElementById("a-desc").value.trim();
  const duration = document.getElementById("a-dur").value.trim();
  // 새 영상은 정렬 순서를 마지막으로 (현재 최대값 + 1)
  const maxOrder = videoCache.reduce((m, v) => Math.max(m, v.sort_order || 0), 0);
  const btn = document.querySelector("#adminPage .submit-btn"); if (btn) { btn.disabled = true; btn.textContent = "추가 중..."; }
  const { error } = await sb.from("videos").insert({
    video_id: vid, title, description, duration, sort_order: maxOrder + 1
  });
  if (error) { alert("영상 추가 실패: " + error.message); if (btn) { btn.disabled = false; btn.textContent = "목록에 추가"; } return; }
  await loadVideos();
  renderAdmin();
}
function startEdit(id) {
  state.editingId = id;
  renderAdmin();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function cancelEdit() {
  state.editingId = null;
  renderAdmin();
}
async function saveEdit() {
  const url = document.getElementById("a-url").value;
  const vid = extractVideoId(url);
  if (!vid) { alert("올바른 유튜브 URL을 입력해 주세요."); return; }
  const title = document.getElementById("a-title").value.trim();
  if (!title) { alert("영상 제목을 입력해 주세요."); return; }
  const description = document.getElementById("a-desc").value.trim();
  const duration = document.getElementById("a-dur").value.trim();
  const btn = document.querySelector("#adminPage .submit-btn"); if (btn) { btn.disabled = true; btn.textContent = "저장 중..."; }
  const { error } = await sb.from("videos").update({
    video_id: vid, title, description, duration
  }).eq("id", Number(state.editingId));
  if (error) { alert("수정 실패: " + error.message); if (btn) { btn.disabled = false; btn.textContent = "수정 저장"; } return; }
  await loadVideos();
  state.editingId = null;
  renderAdmin();
}
async function deleteVideo(id) {
  if (!confirm("이 영상을 목록에서 삭제할까요?")) return;
  const { error } = await sb.from("videos").delete().eq("id", Number(id));
  if (error) { alert("삭제 실패: " + error.message); return; }
  if (state.editingId === id) state.editingId = null;
  await loadVideos();
  renderAdmin();
}
async function moveVideo(id, dir) {
  const videos = getVideos();
  const i = videos.findIndex(v => v.id === id);
  const j = i + dir;
  if (i === -1 || j < 0 || j >= videos.length) return;
  // 두 항목의 sort_order를 서로 교환
  const a = videos[i], b = videos[j];
  const aOrder = a.sort_order, bOrder = b.sort_order;
  // 둘이 같은 값이면 강제로 다르게 만듦
  const newA = bOrder, newB = (aOrder === bOrder) ? bOrder + (dir > 0 ? -1 : 1) : aOrder;
  const r1 = await sb.from("videos").update({ sort_order: newA }).eq("id", Number(a.id));
  const r2 = await sb.from("videos").update({ sort_order: newB }).eq("id", Number(b.id));
  if (r1.error || r2.error) { alert("순서 변경 실패"); return; }
  await loadVideos();
  renderAdmin();
}

/* ---------- 비밀번호 변경 모달 ---------- */
function openChangePwModal() {
  document.getElementById("modalContainer").innerHTML =
    '<div class="modal-bg" onclick="if(event.target===this)closeModal()">' +
      '<div class="modal-card">' +
        '<h3 class="modal-title">🔑 비밀번호 변경</h3>' +
        '<p class="muted">새 비밀번호는 이 브라우저에 안전하게(해시 형태로) 저장됩니다.</p>' +
        '<label class="label" style="margin-top:10px">현재 비밀번호</label>' +
        '<input class="txt" id="cur-pw" type="password" placeholder="현재 비밀번호" />' +
        '<label class="label" style="margin-top:10px">새 비밀번호</label>' +
        '<input class="txt" id="new-pw" type="password" placeholder="새 비밀번호 (8자 이상)" />' +
        '<label class="label" style="margin-top:10px">새 비밀번호 확인</label>' +
        '<input class="txt" id="new-pw2" type="password" placeholder="새 비밀번호 다시 입력" ' +
          'onkeydown="if(event.key===\'Enter\')changePassword()" />' +
        '<button class="submit-btn" onclick="changePassword()">변경하기</button>' +
        '<button class="secondary-btn" onclick="closeModal()">취소</button>' +
      '</div>' +
    '</div>';
  setTimeout(() => { const el = document.getElementById("cur-pw"); if (el) el.focus(); }, 50);
}
function closeModal() {
  document.getElementById("modalContainer").innerHTML = "";
}
async function changePassword() {
  const cur = document.getElementById("cur-pw").value;
  const n1 = document.getElementById("new-pw").value;
  const n2 = document.getElementById("new-pw2").value;
  if (!cur || !n1 || !n2) { alert("모든 칸을 입력해 주세요."); return; }
  if (n1 !== n2) { alert("새 비밀번호가 일치하지 않습니다."); return; }
  if (n1.length < 8) { alert("새 비밀번호는 8자 이상이어야 합니다."); return; }
  const curHash = await sha256(cur);
  if (curHash !== getStoredHash()) { alert("현재 비밀번호가 올바르지 않습니다."); return; }
  const newHash = await sha256(n1);
  setStoredHash(newHash);
  closeModal();
  alert("비밀번호가 변경되었습니다.");
}

/* ---------- 초기화 ---------- */
document.getElementById("footerText").textContent =
  "건강의 벗도 보이(VOY)나요? · 신청 내용은 " + CONFIG.ADMIN_EMAIL + " 로 전송됩니다";
// 먼저 빈 화면을 그리고, Supabase에서 목록 불러오면 다시 그림
renderUser();
(async () => {
  await loadVideos();
  if (state.page === "user") renderUser();
  else renderAdmin();
})();
